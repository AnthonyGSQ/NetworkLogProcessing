name: CI Pipeline

on: 
  push:
    branches: [pull_request, merge_group]
  pull_request:
    branches: [main]

jobs: 
  quality-checks:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: hotel_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create .env file for database
        run: |
          cat > .env << EOF
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_NAME=hotel_db
          DB_USER=testuser
          DB_PASSWORD=testpass
          SERVER_PORT=8080
          SERVER_HOST=127.0.0.1
          EOF
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtest-dev \
            valgrind \
            gcovr \
            clang-format \
            libboost-all-dev \
            postgresql-client \
            libpq-dev
      
      - name: Build and install libpqxx from source
        run: |
          cd /tmp
          git clone --depth 1 --branch 7.10.1 https://github.com/jtv/libpqxx.git
          cd libpqxx
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      
      - name: Initialize database schema
        run: |
          sleep 5  # Wait for PostgreSQL to be ready
          PGPASSWORD=testpass psql -h 127.0.0.1 -U testuser -d hotel_db << 'EOF'
          CREATE EXTENSION IF NOT EXISTS btree_gist;
          CREATE TABLE IF NOT EXISTS reservations (
              id SERIAL PRIMARY KEY,
              guest_name VARCHAR(255) NOT NULL,
              guest_email VARCHAR(255),
              guest_phone VARCHAR(20),
              room_number INTEGER NOT NULL,
              room_type VARCHAR(100),
              number_of_guests INTEGER,
              check_in_date DATE NOT NULL,
              check_out_date DATE NOT NULL,
              number_of_nights INTEGER,
              price_per_night NUMERIC(10, 2),
              total_price NUMERIC(10, 2),
              payment_method VARCHAR(50),
              paid BOOLEAN,
              reservation_status VARCHAR(50),
              special_requests TEXT,
              created_at BIGINT,
              updated_at BIGINT,
              CONSTRAINT "no_overlapping_reservations" EXCLUDE USING gist (room_number WITH =, daterange(check_in_date, check_out_date, '[)') WITH &&)
          );
          EOF
      
      - name: Build project
        run: make all
      
      - name: Check code formatting
        run: |
          find src tests -name "*.cpp" -o -name "*.hpp" | \
          xargs clang-format --dry-run --Werror
      
      - name: Run tests
        run: make test
      
      - name: Check memory leaks
        run: |
          make valgrind
      
      - name: Check coverage threshold
        run: |
          coverage_percent=$(gcovr --print-summary | grep TOTAL | awk '{print $4}' | sed 's/%//')
          echo "Coverage: ${coverage_percent}%"
          if (( $(echo "$coverage_percent < 85" | bc -l) )); then
            echo "Coverage ${coverage_percent}% is below 90%"
            exit 1
          fi
          echo "Coverage ${coverage_percent}% meets minimum"
      
      - name: Generate HTML coverage report
        if: always()
        run: |
          gcovr --html-details coverage.html
          mkdir -p coverage-report
          mv coverage.html coverage-report/
          mv coverage*.html coverage-report/ || true
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
